<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁盘移臂调度模拟 - OS算法模拟系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c0c1d, #1a1a3e, #0d1b2a);
            min-height: 100vh; color: #e0e0e0;
        }
        .navbar {
            background: rgba(0,0,0,0.4); padding: 14px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 16px;
        }
        .navbar a { color: #64b5f6; text-decoration: none; font-size: 0.95em; }
        .navbar a:hover { color: #90caf9; }
        .navbar .sep { color: #546e7a; }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 22px; margin-bottom: 20px;
        }
        .card h3 { color: #64b5f6; margin-bottom: 14px; font-size: 1.1em; }
        .btn {
            padding: 10px 22px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.95em; font-weight: 600;
            transition: all 0.2s; color: #fff;
        }
        .btn-primary { background: #1565c0; }
        .btn-primary:hover { background: #1976d2; }
        .btn-success { background: #2e7d32; }
        .btn-success:hover { background: #388e3c; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        .btn-group .btn.active { box-shadow: 0 0 0 3px rgba(255,255,255,0.4); }
        table {
            width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.88em;
        }
        table th, table td {
            padding: 10px 12px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        table th { color: #90a4ae; font-weight: 600; background: rgba(0,0,0,0.2); }
        table tr:hover { background: rgba(255,255,255,0.03); }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; color: #b0bec5; font-size: 0.85em; margin-bottom: 4px; }
        .form-group input, .form-group select {
            width: 100%; padding: 8px 12px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3); color: #e0e0e0; font-size: 0.9em;
        }
        .row { display: flex; gap: 16px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 180px; }
        .stats { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
        .stat-item { background: rgba(0,0,0,0.3); padding: 12px 18px; border-radius: 10px; text-align: center; }
        .stat-item .label { font-size: 0.8em; color: #78909c; }
        .stat-item .value { font-size: 1.4em; color: #64b5f6; font-weight: 700; }
        .movement-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .move-tag {
            padding: 6px 14px; border-radius: 20px; font-size: 0.85em; font-weight: 600;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }
        .move-tag .from { color: #78909c; }
        .move-tag .to { color: #64b5f6; }
        .move-tag .dist { color: #ffa726; font-size: 0.75em; }

        /* SVG 可视化区域 */
        .chart-container {
            background: rgba(0,0,0,0.25);
            border-radius: 12px; padding: 18px;
            margin: 16px 0; overflow-x: auto;
        }
        .chart-container h4 { color: #90a4ae; margin-bottom: 10px; }
        .chart-svg { width: 100%; min-width: 600px; }
        .axis-label { fill: #78909c; font-size: 11px; }
        .grid-line { stroke: rgba(255,255,255,0.05); stroke-dasharray: 3 3; }
        .track-marker { cursor: pointer; transition: all 0.2s; }
        .track-marker:hover { r: 8; }
        .tooltip-box {
            position: absolute; background: rgba(0,0,0,0.85);
            padding: 6px 10px; border-radius: 6px; font-size: 0.8em;
            color: #e0e0e0; pointer-events: none; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.15);
            display: none; z-index: 100;
        }
        .legend { display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.82em; color: #b0bec5; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/">🏠 首页</a>
        <span class="sep">/</span>
        <span>模块5：磁盘移臂调度模拟</span>
    </div>
    <div class="container">
        <div class="card">
            <h3>💿 参数设置</h3>
            <div class="btn-group" id="algo-btns">
                <button class="btn btn-primary active" data-algo="SSTF">SSTF（最短寻道时间优先）</button>
                <button class="btn btn-primary" data-algo="SCAN">SCAN（电梯算法）</button>
            </div>
            <div id="scan-config" style="display:none; margin-bottom:10px;">
                <label style="color:#b0bec5;">磁头方向：</label>
                <select id="scan-direction" style="padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.3);color:#e0e0e0;">
                    <option value="up">向磁道号增大 (↑)</option>
                    <option value="down">向磁道号减小 (↓)</option>
                </select>
            </div>
            <div class="row">
                <div class="col">
                    <div class="form-group"><label>磁道请求序列（逗号分隔）</label>
                        <input type="text" id="requests" value="98,183,37,122,14,124,65,67"></div>
                </div>
                <div class="col">
                    <div class="form-group"><label>初始磁头位置</label>
                        <input type="number" id="initial-position" value="53" min="0" max="199"></div>
                </div>
                <div class="col" style="display:flex;align-items:flex-end;padding-bottom:10px;">
                    <button class="btn btn-primary" onclick="runSimulation()">▶ 运行模拟</button>
                    <button class="btn btn-success" onclick="generateRandom()" style="margin-left:8px;">🎲 随机生成</button>
                </div>
            </div>
        </div>

        <div class="card" id="result-card" style="display:none;">
            <h3 id="result-title">📈 模拟结果</h3>
            <div class="stats" id="stats-bar"></div>

            <!-- SVG 可视化轨迹图 -->
            <div class="chart-container" id="chart-container">
                <h4>📊 磁头移动轨迹图</h4>
                <div class="legend">
                    <span class="legend-item"><span class="legend-dot" style="background:#64b5f6;"></span> 磁头移动路线</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#4caf50;"></span> 初始位置</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#ff7043;"></span> 请求磁道</span>
                </div>
                <svg class="chart-svg" id="track-svg" viewBox="0 0 900 320"></svg>
            </div>

            <h4 style="color:#90a4ae;margin:14px 0 8px;">磁头移动步序</h4>
            <div class="movement-list" id="movement-list"></div>
            <h4 style="color:#90a4ae;margin:14px 0 8px;">响应顺序</h4>
            <div id="sequence-display" style="font-size:1.1em;"></div>
        </div>
    </div>

    <!-- 悬停提示 -->
    <div class="tooltip-box" id="tooltip"></div>

    <script>
        let selectedAlgo = 'SSTF';

        document.querySelectorAll('#algo-btns .btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#algo-btns .btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedAlgo = btn.dataset.algo;
                document.getElementById('scan-config').style.display = selectedAlgo === 'SCAN' ? 'block' : 'none';
            });
        });

        function generateRandom() {
            const len = 6 + Math.floor(Math.random() * 6);
            const seq = Array.from({length: len}, () => Math.floor(Math.random() * 200)).join(',');
            document.getElementById('requests').value = seq;
            document.getElementById('initial-position').value = Math.floor(Math.random() * 100);
        }

        function drawTrackChart(fullPath, requests, initPos, totalDist) {
            const svg = document.getElementById('track-svg');
            const W = 900, H = 320;
            const PAD_L = 55, PAD_R = 30, PAD_T = 25, PAD_B = 55;
            const plotW = W - PAD_L - PAD_R;
            const plotH = H - PAD_T - PAD_B;

            // 确定X轴范围
            const allTracks = [initPos, ...requests];
            const minTrack = Math.min(...allTracks);
            const maxTrack = Math.max(...allTracks);
            const trackRange = maxTrack - minTrack || 1;
            const xScale = t => PAD_L + ((t - minTrack) / trackRange) * plotW;

            // Y轴：步序
            const steps = fullPath.length;

            let svgInner = '';

            // 背景网格 + Y轴标签
            for (let i = 0; i <= steps; i++) {
                const y = PAD_T + (i / steps) * plotH;
                svgInner += `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" class="grid-line"/>`;
                svgInner += `<text x="${PAD_L - 8}" y="${y + 4}" class="axis-label" text-anchor="end">${fullPath.length - i}</text>`;
            }
            // X轴刻度
            const xTicks = 6;
            for (let i = 0; i <= xTicks; i++) {
                const t = minTrack + (trackRange / xTicks) * i;
                const x = xScale(t);
                svgInner += `<line x1="${x}" y1="${PAD_T + plotH}" x2="${x}" y2="${PAD_T + plotH + 6}" stroke="rgba(255,255,255,0.15)"/>`;
                svgInner += `<text x="${x}" y="${PAD_T + plotH + 20}" class="axis-label" text-anchor="middle">${Math.round(t)}</text>`;
            }
            svgInner += `<text x="${W / 2}" y="${H - 8}" class="axis-label" text-anchor="middle">磁道号</text>`;
            svgInner += `<text x="14" y="${H / 2}" class="axis-label" text-anchor="middle" transform="rotate(-90,14,${H/2})">步序</text>`;

            // 轴框
            svgInner += `<rect x="${PAD_L}" y="${PAD_T}" width="${plotW}" height="${plotH}" fill="none" stroke="rgba(255,255,255,0.1)"/>`;

            // 绘制折线 —— 连接 fullPath 中的点
            let polyPoints = '';
            fullPath.forEach((track, idx) => {
                const x = xScale(track);
                const y = PAD_T + (idx / steps) * plotH;
                polyPoints += `${x},${y} `;
            });
            svgInner += `<polyline points="${polyPoints}" fill="none" stroke="#64b5f6" stroke-width="2.5" stroke-linejoin="round" opacity="0.8"/>`;

            // 绘制数据点
            fullPath.forEach((track, idx) => {
                const x = xScale(track);
                const y = PAD_T + (idx / steps) * plotH;
                const isInit = (idx === 0);
                const isLast = (idx === fullPath.length - 1);
                const color = isInit ? '#4caf50' : (isLast ? '#ffa726' : '#ff7043');
                const r = isInit ? 7 : 5;
                const label = isInit ? '🚀初始' : `P${idx}`;
                svgInner += `<circle cx="${x}" cy="${y}" r="${r}" fill="${color}" stroke="#fff" stroke-width="1.5" class="track-marker" data-step="${idx}" data-track="${track}"/>`;
                if (isInit || idx === fullPath.length - 1 || idx % Math.max(1, Math.floor(fullPath.length / 8)) === 0) {
                    svgInner += `<text x="${x}" y="${y - 10}" fill="#b0bec5" font-size="10" text-anchor="middle">${label}</text>`;
                }
            });

            // 移动距离标注（折线段中间）
            for (let i = 1; i < fullPath.length; i++) {
                const x1 = xScale(fullPath[i - 1]);
                const y1 = PAD_T + ((i - 1) / steps) * plotH;
                const x2 = xScale(fullPath[i]);
                const y2 = PAD_T + (i / steps) * plotH;
                const mx = (x1 + x2) / 2;
                const my = (y1 + y2) / 2;
                const dist = Math.abs(fullPath[i] - fullPath[i - 1]);
                svgInner += `<text x="${mx}" y="${my - 5}" fill="#ffa726" font-size="9" text-anchor="middle" opacity="0.7">${dist}</text>`;
            }

            svg.innerHTML = svgInner;

            // 添加鼠标悬浮事件
            setTimeout(() => {
                document.querySelectorAll('.track-marker').forEach(circle => {
                    circle.addEventListener('mouseenter', (e) => {
                        const s = circle.dataset.step;
                        const t = circle.dataset.track;
                        const tip = document.getElementById('tooltip');
                        tip.textContent = `步序 ${s}：磁道 ${t}`;
                        tip.style.display = 'block';
                        tip.style.left = (e.pageX + 12) + 'px';
                        tip.style.top = (e.pageY - 30) + 'px';
                    });
                    circle.addEventListener('mouseleave', () => {
                        document.getElementById('tooltip').style.display = 'none';
                    });
                });
            }, 50);
        }

        async function runSimulation() {
            const reqStr = document.getElementById('requests').value;
            const requests = reqStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            const initPos = parseInt(document.getElementById('initial-position').value) || 0;
            const direction = document.getElementById('scan-direction').value;

            if (requests.length === 0) { alert('请输入有效的磁道请求序列'); return; }

            try {
                const resp = await fetch('/api/disk_scheduling/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        algorithm: selectedAlgo,
                        requests,
                        initial_position: initPos,
                        direction
                    })
                });
                const data = await resp.json();
                if (data.error) { alert(data.error); return; }

                document.getElementById('result-title').textContent = `📈 ${selectedAlgo} 算法模拟结果`;

                document.getElementById('stats-bar').innerHTML = `
                    <div class="stat-item"><div class="label">寻道总长度</div><div class="value">${data.total_distance}</div></div>
                    <div class="stat-item"><div class="label">服务磁道数</div><div class="value">${data.sequence.length}</div></div>
                    <div class="stat-item"><div class="label">初始位置</div><div class="value">${initPos}</div></div>`;

                // 构建完整的路径：[初始位置, ...响应顺序]
                const fullPath = [initPos, ...data.sequence];

                // 绘制 SVG 轨迹图
                drawTrackChart(fullPath, requests, initPos, data.total_distance);

                // 移动轨迹标签
                const moveDiv = document.getElementById('movement-list');
                moveDiv.innerHTML = data.movements.map(m => `
                    <div class="move-tag">
                        <span class="from">${m.from}</span> →
                        <span class="to">${m.to}</span>
                        <span class="dist">(${m.distance})</span>
                    </div>`).join('');

                // 响应顺序
                document.getElementById('sequence-display').innerHTML =
                    `<span style="color:#4caf50;">🚀 ${initPos}</span> → ` +
                    data.sequence.map(s => `<span style="color:#64b5f6;font-weight:600;">${s}</span>`).join(' → ') +
                    ` <span style="color:#ffa726;font-weight:600;">🏁 结束</span>`;

                document.getElementById('result-card').style.display = 'block';
                document.getElementById('result-card').scrollIntoView({behavior:'smooth'});
            } catch (e) {
                alert('请求失败: ' + e.message);
            }
        }
    </script>
</body>
</html>
